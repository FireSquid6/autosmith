name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build all targets
        run: bun scripts/build-all-versions.ts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/autosmith-linux-x64
            build/autosmith-linux-arm64
            build/autosmith-darwin-x64
            build/autosmith-darwin-arm64
            build/autosmith-windows-x64.exe
